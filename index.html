!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Step Registration Form</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .form-container {
            background-color: #ffffff;
            width: 90%;
            max-width: 800px;
            padding: 20px;
            border: 1px solid #ccc;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        fieldset {
            border: 1px solid #ccc;
            padding: 20px;
            margin-bottom: 15px;
        }

        legend {
            font-weight: bold;
            font-size: 1.1em;
        }

        /* Form Steps - Hidden by default */
        .form-step {
            display: none;
        }

        /* Active step display */
        .form-step.active {
            display: block;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .input-group input[type="text"],
        .input-group input[type="email"],
        .input-group input[type="password"],
        .input-group select,
        .input-group textarea {
            width: 100%;
            max-width: 400px;
            padding: 6px;
            border: 1px solid #aaa;
            border-radius: 2px;
        }

        .input-group textarea {
            height: 80px;
            resize: none;
        }

        .radio-group {
            margin-bottom: 15px;
        }

        .radio-group label {
            margin-right: 15px;
            font-size: 0.9em;
        }

        .checkbox-group {
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        /* Buttons Styling matching your UI */
        .btn-container {
            margin-top: 20px;
        }

        .btn {
            background: linear-gradient(to bottom, #4fa4cd, #1d668f);
            color: white;
            border: 1px solid #134460;
            padding: 6px 20px;
            font-size: 0.9em;
            cursor: pointer;
            border-radius: 15px;
            margin-right: 10px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
        }

        .btn:hover {
            background: linear-gradient(to bottom, #5cb2dc, #2475a3);
        }

        .btn:disabled {
            background: #ccc;
            border-color: #aaa;
            color: #666;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="form-container">
    <form id="multiStepForm">

        <div class="form-step active" id="step-1">
            <fieldset>
                <legend>Account</legend>
                
                <div class="input-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" placeholder="Enter Email">
                </div>

                <div class="input-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" placeholder="Enter Password">
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirm Password:</label>
                    <input type="password" id="confirm-password" placeholder="Confirm Password">
                </div>
            </fieldset>

            <div class="btn-container">
                <button type="button" class="btn" disabled>Back</button>
                <button type="button" class="btn next-btn">Next</button>
            </div>
        </div>

        <div class="form-step" id="step-2">
            <fieldset>
                <legend>Account</legend>
                
                <div class="input-group">
                    <label for="firstname">First Name:</label>
                    <input type="text" id="firstname" placeholder="Enter First Name">
                </div>

                <div class="input-group">
                    <label for="lastname">Last Name:</label>
                    <input type="text" id="lastname" placeholder="Enter Last Name">
                </div>

                <div class="input-group">
                    <label for="cnic">CNIC:</label>
                    <input type="text" id="cnic" placeholder="xxxxx-xxxxxxx-x">
                </div>

                <div class="input-group">
                    <label for="social-link">Social Link:</label>
                    <input type="text" id="social-link" value="www.facebook.com">
                </div>
            </fieldset>

            <div class="btn-container">
                <button type="button" class="btn prev-btn">Back</button>
                <button type="button" class="btn next-btn">Next</button>
            </div>
        </div>

        <div class="form-step" id="step-3">
            <fieldset>
                <legend>Review</legend>
                
                <div class="input-group">
                    <label for="hear-about">How did you hear about us?</label>
                    <select id="hear-about">
                        <option>Facebook</option>
                        <option>Google</option>
                        <option>Friend</option>
                    </select>
                </div>

                <div class="radio-group">
                    <p style="margin: 0 0 5px 0; font-size: 0.9em;">Would you visit again?</p>
                    <label><input type="radio" name="visit" value="yes"> Yes</label>
                    <label><input type="radio" name="visit" value="no"> No</label>
                    <label><input type="radio" name="visit" value="maybe" checked> Maybe</label>
                </div>

                <div class="input-group">
                    <label for="comments">Comments:</label>
                    <textarea id="comments" placeholder="Enter your Comments here..."></textarea>
                </div>

                <div class="input-group">
                    <label for="file-upload">Documents:</label>
                    <input type="file" id="file-upload">
                </div>

                <div class="checkbox-group">
                    <label><input type="checkbox"> Sign up for email updates</label>
                </div>
            </fieldset>

            <div class="btn-container">
                <button type="button" class="btn prev-btn">Back</button>
                <button type="submit" class="btn">Submit</button>
            </div>
        </div>

    </form>
</div>

<script>
    const steps = Array.from(document.querySelectorAll('.form-step'));
    const nextButtons = document.querySelectorAll('.next-btn');
    const prevButtons = document.querySelectorAll('.prev-btn');
    const form = document.getElementById('multiStepForm');

    // Next Button Click Logic
    nextButtons.forEach(button => {
        button.addEventListener('click', () => {
            changeStep(1);
        });
    });

    // Back Button Click Logic
    prevButtons.forEach(button => {
        button.addEventListener('click', () => {
            changeStep(-1);
        });
    });

    function changeStep(increment) {
        const activeStep = document.querySelector('.form-step.active');
        let index = steps.indexOf(activeStep);
        
        // Remove active class from current step
        activeStep.classList.remove('active');
        
        // Calculate new step index
        index += increment;
        
        // Add active class to new step
        steps[index].classList.add('active');
    }

    // Form Submit handling (Redirects to done.html)
    form.addEventListener('submit', (e) => {
        e.preventDefault(); 
        
        // Yeh line user ko direct done.html file per bhej degi
        window.location.href = "done.html";
    });
</script>

</body>
</html>
